# Configuration lychee pour la vérification des liens externes
# https://lychee.cli.rs/usage/config/

# Ne vérifier que les liens HTTP/HTTPS (ignorer les liens relatifs Markdown)
include_mail = false
scheme = ["https", "http"]

# User-agent curl pour réduire les blocages anti-bot
user_agent = "curl/8.0"

# Accepter les codes de réponse courants
# 200/204: OK, 301/302: redirections, 403: accès refusé (anti-bot),
# 406: Not Acceptable (kyocera-avx.com), 429: rate limit,
# 202: Accepted (infineon.com, réponse asynchrone)
accept = [200, 202, 204, 301, 302, 403, 406, 429]

# Timeout par requête
timeout = 30

# Nombre max de tentatives
max_retries = 3

# Limiter la concurrence pour éviter le rate limiting
max_concurrency = 3

exclude = [
  # Liens locaux
  "localhost",
  "127\\.0\\.0\\.1",
  "example\\.com",

  # Assets statiques Docusaurus (root-relatifs, résolus au build)
  "^/img/",
  "^/docs/schematics/",
  "^/assets/",

  # Sites incompatibles HTTP/2 avec lychee (vérifiés manuellement OK)
  # TODO: migrer vers linkinator pour supporter HTTP/1.1 — voir issue #98
  "www\\.st\\.com",
  "www\\.tdk\\.com",
  "www\\.te\\.com",
  "www\\.molex\\.com",
  "www\\.yageo\\.com",
  "www\\.smcdiode\\.com",
  "industrial\\.panasonic\\.com",
]

# Exclure les répertoires
exclude_path = [
  "node_modules",
  "build",
  ".docusaurus",
]
