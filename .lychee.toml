# Configuration lychee pour la vérification des liens externes
# https://lychee.cli.rs/usage/config/

# Ne vérifier que les liens HTTP/HTTPS (ignorer les liens relatifs Markdown)
include_mail = false
scheme = ["https", "http"]

# Racine pour résoudre les chemins root-relatifs (/img/..., /docs/...)
root_dir = "static"

# User-agent qui imite curl pour éviter les blocages anti-bot et HTTP/2
# Note : lychee ne supporte pas le forçage HTTP/1.1, mais un user-agent
# reconnu réduit les erreurs avec certains sites (st.com, molex, te.com)
user_agent = "curl/8.0"

# Accepter les codes de réponse courants
accept = [200, 204, 301, 302, 403, 429]

# Timeout par requête
timeout = 30

# Nombre max de tentatives
max_retries = 3

# Limiter la concurrence pour éviter le rate limiting
max_concurrency = 3

# Exclure les sites incompatibles avec lychee
# - localhost/example : pas de réseau
# - st.com, tdk.com, te.com, molex.com : erreurs HTTP/2 (lychee ne supporte pas HTTP/1.1)
# - yageo.com, smcdiode.com : connection reset (protection anti-bot)
# - industrial.panasonic.com : timeout systématique
# Ces liens sont valides dans un navigateur — vérification manuelle périodique recommandée
exclude = [
  "localhost",
  "127\\.0\\.0\\.1",
  "example\\.com",
  "www\\.st\\.com",
  "www\\.tdk\\.com",
  "www\\.te\\.com",
  "www\\.molex\\.com",
  "www\\.yageo\\.com",
  "www\\.smcdiode\\.com",
  "industrial\\.panasonic\\.com",
]

# Exclure les répertoires
exclude_path = [
  "node_modules",
  "build",
  ".docusaurus",
]
