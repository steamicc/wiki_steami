name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint commit messages
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: Check formatting
        run: npm run format:check

      - name: Lint Markdown
        run: npm run lint:md

      - name: Spell check
        run: npm run lint:spell

      - name: Lint JavaScript
        run: npm run lint:js

      - name: Build site
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Validate code examples
        run: npm run lint:examples

      - name: Check for broken links
        run: |
          if grep -q "Docusaurus found broken links" build.log; then
            echo "::error::Broken links detected in the build output"
            grep -A 100 "Exhaustive list of all broken links" build.log || true
            exit 1
          fi
          echo "No broken links found"
